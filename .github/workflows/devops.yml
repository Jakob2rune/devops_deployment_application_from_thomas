name: DevOps Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Application Version
        id: semver-app
        uses: paulhatch/semantic-version@v5.4.0
        with:
          bump_each_commit: true

      # NEW: Convert repository name to lowercase (required for Docker) 
      - name: Convert repository name to lowercase
        id: repo_lower
        run: |
          echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          docker build \
            -t ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}:staging \
            -t ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}:${{ steps.semver-app.outputs.version }} \
            -f DevOpsWebApplication/Dockerfile .
          docker push ghcr.io/${{ steps.repo_lower.outputs.repo_lower }} --all-tags

      - name: Create release notes
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.semver-app.outputs.version }}
          generateReleaseNotes: true
          body: |
            This release includes the following container image:
            https://ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}:${{ steps.semver-app.outputs.version }}

      # ===== Deploy to staging server using Docker Compose =====
      - name: Deliver Docker Compose file to staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.STAGING_SERVER_IP }}
          username: ${{ vars.STAGING_SERVER_USERNAME }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          source: "compose.yaml"
          target: dowa/

      - name: Run Docker Compose on staging server
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ vars.STAGING_SERVER_IP }}
          username: ${{ vars.STAGING_SERVER_USERNAME }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            cd dowa
            docker compose pull
            docker compose up -d